name: 'Continuous Integration'

on:
  workflow_dispatch: {}
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  setup:
    name: 'Install & Build'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v7
        with:
          node-version-file: '.node-version'
          cache: 'pnpm'

      - id: cache-modules
        uses: actions/cache@v6
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}

      - id: cache-build
        uses: actions/cache@v6
        with:
          path: bin
          key: build-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml', 'src/**/*.ts', 'tsconfig*.json') }}

      - if: steps.cache-modules.outputs.cache-hit != 'true'
        run: pnpm install --frozen-lockfile

      - if: steps.cache-build.outputs.cache-hit != 'true'
        run: pnpm build

  audit:
    needs: setup
    name: 'Audit & Supply Chain'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v7
        with:
          node-version-file: '.node-version'
          cache: 'pnpm'

      - uses: actions/cache/restore@v6
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}

      - uses: actions/cache/restore@v6
        with:
          path: bin
          key: build-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml', 'src/**/*.ts', 'tsconfig*.json') }}

      - run: pnpm dep:cruise

      - run: pnpm audit --prod --audit-level=high

  lint:
    needs: audit
    name: 'Lint'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v7
        with:
          node-version-file: '.node-version'
          cache: 'pnpm'

      - uses: actions/cache/restore@v6
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}

      - uses: actions/cache/restore@v6
        with:
          path: bin
          key: build-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml', 'src/**/*.ts', 'tsconfig*.json') }}

      - run: pnpm lint:check

  unit:
    needs: lint
    name: 'Unit Tests'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v7
        with:
          node-version-file: '.node-version'
          cache: 'pnpm'

      - uses: actions/cache/restore@v6
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}

      - uses: actions/cache/restore@v6
        with:
          path: bin
          key: build-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml', 'src/**/*.ts', 'tsconfig*.json') }}

      - run: pnpm test:unit

      - if: always()
        name: Upload unit-test coverage
        uses: actions/upload-artifact@v7
        with:
          name: unit-test-coverage
          path: coverage/
          retention-days: 14
          if-no-files-found: warn

  mutation:
    needs: unit
    name: 'Mutation Tests'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v7
        with:
          node-version-file: '.node-version'
          cache: 'pnpm'

      - uses: actions/cache/restore@v6
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}

      - uses: actions/cache/restore@v6
        with:
          path: bin
          key: build-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml', 'src/**/*.ts', 'tsconfig*.json') }}

      - name: Mutation tests
        run: |
          set -o pipefail
          pnpm test:mutation 2>&1 | tee /tmp/mutation.log

      - name: Mutation summary
        if: always()
        run: |
          score=$(awk -F'|' '/^All files/ {gsub(/ /, "", $2); print $2; exit}' /tmp/mutation.log 2>/dev/null)
          {
            echo "### Mutation testing"
            echo '```'
            if [ -n "$score" ]; then
              echo "Mutation score: ${score}%"
            else
              echo "see uploaded mutation-reports artifact"
            fi
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - if: always()
        name: Upload mutation reports
        uses: actions/upload-artifact@v7
        with:
          name: mutation-reports
          path: reports/mutation/
          retention-days: 14
          if-no-files-found: warn

  integration:
    needs: unit
    name: 'Integration (LocalStack)'
    runs-on: ubuntu-24.04
    env:
      AWS_ENDPOINT_URL: http://localhost:4566
      AWS_REGION: us-east-1
      AWS_DEFAULT_REGION: us-east-1
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v7
        with:
          node-version-file: '.node-version'
          cache: 'pnpm'

      - id: cache-modules
        uses: actions/cache/restore@v6
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}

      - id: cache-build
        uses: actions/cache/restore@v6
        with:
          path: bin
          key: build-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml', 'src/**/*.ts', 'tsconfig*.json') }}

      - if: steps.cache-modules.outputs.cache-hit != 'true'
        run: pnpm install --frozen-lockfile

      - if: steps.cache-build.outputs.cache-hit != 'true'
        run: pnpm build

      - name: Start LocalStack
        run: docker compose up -d --wait

      - name: Integration tests
        run: |
          set -o pipefail
          pnpm test:integration 2>&1 | tee /tmp/integration.log

      - name: Integration summary
        if: always()
        run: |
          {
            echo "### Integration (LocalStack)"
            echo '```'
            grep -E '✓|✘|✗|[0-9]+ (passed|failed|flaky|skipped)' /tmp/integration.log || tail -n 20 /tmp/integration.log
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - if: always()
        name: Upload Playwright report
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: playwright/reports/playwright/
          retention-days: 14
          if-no-files-found: warn

      - if: always()
        name: Stop LocalStack
        run: docker compose down
